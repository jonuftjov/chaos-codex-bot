name: Chaos Codex Bot Runner (Docker)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # يعيد التشغيل كل 6 ساعات لضمان الاستمرار
  push:
    branches: [ main ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t chaos-bot .

      - name: Run Bot in Docker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SECRET_IV: ${{ secrets.SECRET_IV }}
        run: |
          docker run --name chaos-bot-container \
            -e TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN \
            -e SECRET_KEY=$SECRET_KEY \
            -e SECRET_IV=$SECRET_IV \
            chaos-bot
        timeout-minutes: 350
