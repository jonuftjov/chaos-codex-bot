name: Chaos Codex Bot Runner



on:

  push:
  
    branches: [ main ]
    
  schedule:
  
    - cron: '0 */6 * * *' # إعادة التشغيل كل 6 ساعات لضمان الاستمرارية
    
  workflow_dispatch: # السماح بالتشغيل اليدوي
  


jobs:

  run-bot:
  
    runs-on: ubuntu-latest
    
    steps:
    
      - name: Checkout code
      
        uses: actions/checkout@v3
        


      - name: Set up Python
      
        uses: actions/setup-python@v4
        
        with:
        
          python-version: '3.10'
          


      - name: Install dependencies
      
        run: |
        
          python -m pip install --upgrade pip
          
          pip install -r requirements.txt
          


      - name: Run Bot
      
        run: |
        
          # تشغيل البوت مع مهلة زمنية طويلة (GitHub Actions يسمح بـ 6 ساعات لكل تشغيل)
          
          # سيتم إعادة التشغيل تلقائياً بواسطة الـ schedule
          
          python main.py
          
        timeout-minutes: 350 # حوالي 5.8 ساعات لترك وقت للتنظيف قبل الـ 6 ساعات القصوى
        
concurrency: 

























